name: Build and Push Images
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Log in to Docker Hub
      run: echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
    - name: Build Backend Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sairen-atelier-backend:latest backend/
    - name: Push Backend Image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/sairen-atelier-backend:latest
    - name: Build Frontend Image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sairen-atelier-frontend:latest frontend/
    - name: Push Frontend Image
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/sairen-atelier-frontend:latest