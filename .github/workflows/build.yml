name: Build and Push Images
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Log in to GitHub Container Registry
      run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    - name: Build Backend Image
      run: docker build -t ghcr.io/${{ github.repository_owner | lower }}/sairen-atelier/backend:latest backend/
    - name: Push Backend Image
      run: docker push ghcr.io/${{ github.repository_owner | lower }}/sairen-atelier/backend:latest
    - name: Build Frontend Image
      run: docker build -t ghcr.io/${{ github.repository_owner | lower }}/sairen-atelier/frontend:latest frontend/
    - name: Push Frontend Image
      run: docker push ghcr.io/${{ github.repository_owner | lower }}/sairen-atelier/frontend:latest