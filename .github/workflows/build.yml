name: Build and Push Images
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Log in to GitHub Container Registry
      run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    - name: Build Backend Image
      run: |
        OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
        docker build -t ghcr.io/$OWNER/sairen-atelier/backend:latest backend/
    - name: Push Backend Image
      run: |
        OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
        docker push ghcr.io/$OWNER/sairen-atelier/backend:latest
    - name: Build Frontend Image
      run: |
        OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
        docker build -t ghcr.io/$OWNER/sairen-atelier/frontend:latest frontend/
    - name: Push Frontend Image
      run: |
        OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
        docker push ghcr.io/$OWNER/sairen-atelier/frontend:latest