name: Build and Push Images
on:
  push:
    branches: [main, dev]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Log in to GitHub Container Registry
      run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    - name: Set image tag by branch
      run: |
        if [ "${GITHUB_REF_NAME}" = "main" ]; then
          echo "IMAGE_TAG=latest" >> $GITHUB_ENV
        elif [ "${GITHUB_REF_NAME}" = "dev" ]; then
          echo "IMAGE_TAG=dev" >> $GITHUB_ENV
        else
          echo "IMAGE_TAG=latest" >> $GITHUB_ENV
        fi
    - name: Build Backend Image
      run: |
        OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
        docker build -t ghcr.io/$OWNER/sairen-atelier/backend:${IMAGE_TAG} backend/
    - name: Push Backend Image
      run: |
        OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
        docker push ghcr.io/$OWNER/sairen-atelier/backend:${IMAGE_TAG}
    - name: Build Frontend Image
      run: |
        OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
        docker build -t ghcr.io/$OWNER/sairen-atelier/frontend:${IMAGE_TAG} frontend/
    - name: Push Frontend Image
      run: |
        OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
        docker push ghcr.io/$OWNER/sairen-atelier/frontend:${IMAGE_TAG}