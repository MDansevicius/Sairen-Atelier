apiVersion: apps/v1
kind: Deployment
metadata:
  name: eshop-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eshop-frontend
  template:
    metadata:
      labels:
        app: eshop-frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/mdansevicius/sairen-atelier/frontend:latest
        ports:
        - containerPort: 3000